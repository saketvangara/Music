# Builds the SkinScan app and publishes it to GitHub Pages on every push.
# Site URL: https://<owner>.github.io/music/
#
# One-time setup if the first run fails on "Pages not enabled":
# repo Settings → Pages → Source: "GitHub Actions".

name: Deploy SkinScan to GitHub Pages

on:
  push:
    branches: [master, claude/face-scan-skincare-app-9tyss6]
    paths:
      - 'skin-scan/**'
      - '.github/workflows/deploy-skinscan-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skin-scan
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: skin-scan/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run heuristic tests
        run: npm run test:heuristics

      - name: Build (relative base — works at any Pages subpath)
        run: npx vite build --base=./

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: skin-scan/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
